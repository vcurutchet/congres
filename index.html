<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrement Congrès</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f4f7f9; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { display: block; margin: 0 auto 20px auto; max-width: 200px; height: auto; }
        h2 { color: #0070d2; font-size: 1.6em; margin-bottom: 25px; transition: all 0.3s; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; text-align: left; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #dddbda; border-radius: 4px; box-sizing: border-box; font-size: 16px; font-family: inherit; background-color: white; }
        input:focus, textarea:focus, select:focus { border-color: #0070d2; outline: none; box-shadow: 0 0 4px rgba(0,112,210,0.5); }
        .btn { background-color: #0070d2; color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn:hover { background-color: #005fb2; }
        .btn-secondary { background-color: #f3f3f3; color: #706e6b; font-size: 14px; padding: 8px; margin-top: 15px; border: 1px solid #dddbda; }
        .footer { text-align: center; font-size: 12px; color: #706e6b; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
        
        .step-hidden { display: none; }
        .progress-bar { height: 4px; width: 100%; background: #eee; margin-bottom: 20px; border-radius: 2px; }
        .progress-fill { height: 100%; width: 50%; background: #0070d2; border-radius: 2px; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://kairosandyou.fr/wp-content/uploads/2022/12/timkl-logo.png" alt="Timkl Logo" class="logo">
    
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <h2 id="display-title">Enregistrement Congrès</h2>
    
    <form id="leadForm" action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8" method="POST">

        <input type="hidden" name="oid" value="00Dbg000002I0Ev">
        <input type="hidden" name="retURL" id="retURL_field" value="">
        <input type="hidden" name="Campaign_ID" id="campaign_id_field" value="">

        <div id="section1">
            <label for="first_name">Prénom</label>
            <input id="first_name" name="first_name" type="text" maxlength="40" required placeholder="Jean" />

            <label for="last_name">Nom</label>
            <input id="last_name" name="last_name" type="text" maxlength="80" required placeholder="Dupont" />

            <label for="email">Email professionnel</label>
            <input id="email" name="email" type="email" maxlength="80" required placeholder="jean.dupont@mail.com" />

            <label for="company">Établissement / Société</label>
            <input id="company" name="company" type="text" maxlength="40" required placeholder="Ex: CHU de Paris" />

            <label for="zip">Code Postal</label>
            <input id="zip" name="zip" type="text" maxlength="20" required placeholder="75001" />

            <button type="button" class="btn" onclick="goToStep2()">Suivant</button>
        </div>

        <div id="section2" class="step-hidden">
            <label for="industry">Secteur d'activité</label>
            <select id="industry" name="industry" required>
                <option value="" disabled selected>-- Choisir un secteur --</option>
                <option value="Pharmacie">Pharmacie</option>
                <option value="CHU">CHU / Libéral</option>
                <option value="Autres">Autres</option>
            </select>

            <label for="description">Description / Notes de visite</label>
            <textarea id="description" name="description" rows="5" placeholder="Précisez le besoin ou le contexte..."></textarea>

            <button type="submit" class="btn">Valider ma présence</button>
            <button type="button" class="btn btn-secondary" onclick="goToStep1()">← Retour aux infos</button>
        </div>

        <p class="footer">
            Données sécurisées | Enregistrement CRM Timkl
        </p>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const originalEventName = urlParams.get('event') ? decodeURIComponent(urlParams.get('event')) : "Enregistrement Congrès";
    
    document.getElementById('display-title').innerText = originalEventName;

    function goToStep2() {
        // Validation basique étape 1
        const requiredFields = ['first_name', 'last_name', 'email', 'company', 'zip'];
        let allValid = true;
        
        requiredFields.forEach(id => {
            if(!document.getElementById(id).value) allValid = false;
        });

        if(allValid) {
            document.getElementById('section1').classList.add('step-hidden');
            document.getElementById('section2').classList.remove('step-hidden');
            document.getElementById('progress').style.width = "100%";
            document.getElementById('display-title').innerText = "Précisions";
        } else {
            alert("Veuillez remplir tous les champs obligatoires.");
        }
    }

    function goToStep1() {
        document.getElementById('section2').classList.add('step-hidden');
        document.getElementById('section1').classList.remove('step-hidden');
        document.getElementById('progress').style.width = "50%";
        document.getElementById('display-title').innerText = originalEventName;
    }

    const campId = urlParams.get('id');
    document.getElementById('campaign_id_field').value = campId || "701bg00000PjhEYAAZ";
    document.getElementById('retURL_field').value = window.location.href;
</script>

</body>
</html>
